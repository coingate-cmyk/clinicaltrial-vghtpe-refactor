<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Public-safe clinical trial parsing, classification, search, and import review workspace.">
  <title>Clinical Trial Refactor Workspace</title>
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Clinical Trial VGH-TPE Refactor</p>
        <h1>臨床試驗搜尋與匯入工作台</h1>
        <p class="header-copy">以合成資料測試資料正規化、臨床分類、語意搜尋、檔案解析、匯入審查與本機保存架構。</p>
      </div>
      <div class="version-pill">Public test v0.5</div>
    </div>
  </header>

  <main class="app-shell">
    <section class="toolbar" aria-label="搜尋與篩選">
      <div class="search-row">
        <input id="searchInput" class="search-input" type="search" placeholder="搜尋 trial code、癌別、藥物、PI，或輸入 HER2+、MSI-H/dMMR、CPS>=5…" autocomplete="off">
        <button id="clearSearchButton" class="ghost" type="button">清除搜尋</button>
      </div>
      <div class="chips" aria-label="搜尋範例">
        <button class="chip" data-query="HER2+">HER2 陽性</button>
        <button class="chip" data-query="HER2 low">HER2-low</button>
        <button class="chip" data-query="CLDN18.2+">CLDN18.2 陽性</button>
        <button class="chip" data-query="MSI-H/dMMR">MSI-H／dMMR</button>
        <button class="chip" data-query="MSS/pMMR">MSS／pMMR</button>
        <button class="chip" data-query="KRAS G12C">KRAS G12C</button>
        <button class="chip" data-query="BRAF V600E">BRAF V600E</button>
        <button class="chip" data-query="FGFR2b+">FGFR2b 陽性</button>
        <button class="chip" data-query="PD-L1 CPS>=5">PD-L1 CPS≥5</button>
        <button class="chip" data-query="HCC 1L">HCC 1L</button>
      </div>
      <div class="filters">
        <label class="field"><span>癌別</span><select id="cancerFilter"><option value="">全部癌別</option></select></label>
        <label class="field"><span>治療線別／情境</span><select id="lineFilter"><option value="">全部線別</option></select></label>
        <label class="field"><span>收案狀態</span><select id="statusFilter"><option value="">全部狀態</option></select></label>
        <label class="checkbox-field"><input id="activeOnlyFilter" type="checkbox"> 只顯示仍可收案／準備中</label>
      </div>
      <div class="actions">
        <button id="addButton" class="primary" type="button">新增試驗</button>
        <button id="importButton" class="secondary" type="button">匯入與審查</button>
        <button id="exportButton" class="ghost" type="button">匯出 JSON</button>
        <button id="resetButton" class="ghost" type="button">重設合成資料</button>
      </div>
    </section>

    <section>
      <div class="summary-row">
        <div id="resultSummary" class="summary-text"></div>
        <div id="statList" class="stat-list"></div>
      </div>
      <div id="trialGrid" class="trial-grid"></div>
    </section>
  </main>

  <dialog id="detailDialog">
    <div class="dialog-header"><h2 id="detailTitle">試驗詳情</h2><button class="close-button" data-close-dialog="detailDialog" aria-label="關閉">×</button></div>
    <div id="detailBody" class="dialog-body"></div>
    <div class="dialog-footer"><button id="editFromDetailButton" class="secondary" type="button">編輯</button><button class="ghost" data-close-dialog="detailDialog" type="button">關閉</button></div>
  </dialog>

  <dialog id="editDialog">
    <div class="dialog-header"><h2 id="editDialogTitle">新增試驗</h2><button class="close-button" data-close-dialog="editDialog" aria-label="關閉">×</button></div>
    <form id="trialForm">
      <div class="dialog-body">
        <input id="editOriginalKey" type="hidden">
        <div class="form-grid">
          <label class="field"><span>試驗代號</span><input id="editCode" required></label>
          <label class="field"><span>收案狀態</span><select id="editStatus"><option value="Recruiting">收案中</option><option value="Pending">準備中</option><option value="Temporarily closed">暫停</option><option value="Closed">停止收案</option><option value="Unknown">未知</option></select></label>
          <label class="field wide"><span>試驗名稱</span><input id="editTitle" required></label>
          <label class="field"><span>癌別</span><input id="editCancer" placeholder="例如 gastric cancer"></label>
          <label class="field"><span>治療線別／情境</span><input id="editLines" placeholder="例如 1L, metastatic"></label>
          <label class="field"><span>Sponsor</span><input id="editSponsor"></label>
          <label class="field"><span>Phase</span><input id="editPhase"></label>
          <label class="field"><span>PI</span><input id="editPi"></label>
          <label class="field"><span>研究護理師／Coordinator</span><input id="editNurse"></label>
          <label class="field wide"><span>Inclusion criteria</span><textarea id="editInclusion"></textarea></label>
          <label class="field wide"><span>Exclusion criteria</span><textarea id="editExclusion"></textarea></label>
          <label class="field wide"><span>備註</span><textarea id="editNotes"></textarea></label>
        </div>
      </div>
      <div class="dialog-footer"><button class="ghost" data-close-dialog="editDialog" type="button">取消</button><button class="primary" type="submit">儲存</button></div>
    </form>
  </dialog>

  <dialog id="importDialog">
    <div class="dialog-header"><div><h2>匯入與審查</h2><p class="header-copy" style="color:#626f85;margin:5px 0 0">先解析、分類與比對，確認後才寫入本機資料。</p></div><button class="close-button" data-close-dialog="importDialog" aria-label="關閉">×</button></div>
    <div class="dialog-body">
      <div class="notice">Public 測試站只使用瀏覽器本機儲存。請勿貼入病人資料、正式帳號或院內敏感內容。</div>
      <div class="form-grid">
        <label class="field"><span>資料格式</span><select id="importFormat"><option value="auto">自動判斷</option><option value="json">JSON</option><option value="pdf">PDF 檔案</option><option value="spreadsheet">Excel XLS／XLSX</option><option value="table">CSV／TSV／貼上 Excel</option><option value="document">文件文字／protocol text</option></select></label>
        <label class="field"><span>選擇檔案</span><input id="importFile" type="file" accept=".pdf,.xlsx,.xls,.xlsm,.xlsb,.ods,.json,.csv,.tsv,.txt,application/pdf,text/plain,application/json,text/csv"></label>
        <label class="field wide"><span>貼上內容</span><textarea id="importText" style="min-height:190px" placeholder="可直接選 PDF／Excel 檔案，或貼 JSON、CSV、表格及 protocol 文字"></textarea></label>
      </div>
      <div class="actions" style="border-top:0;padding-top:0"><button id="parseImportButton" class="primary" type="button">解析並比對</button><button id="loadImportExampleButton" class="ghost" type="button">載入範例</button></div>
      <div id="importStatus" class="import-status">尚未解析。</div>
      <div id="reviewList" class="review-list"></div>
    </div>
    <div class="dialog-footer"><button class="ghost" data-close-dialog="importDialog" type="button">關閉</button><button id="applyImportButton" class="primary" type="button" disabled>套用勾選項目</button></div>
  </dialog>

  <script src="./js/core/normalization.js"></script>
  <script src="./js/core/trial-schema.js"></script>
  <script src="./js/core/trial-merge.js"></script>
  <script src="./js/classification/rule-engine.js"></script>
  <script src="./js/classification/cancer-type.js"></script>
  <script src="./js/classification/treatment-line.js"></script>
  <script src="./js/classification/enrollment-status.js"></script>
  <script src="./js/classification/index.js"></script>
  <script src="./js/search/biomarker-classifier.js"></script>
  <script src="./js/search/biomarker-registry.js"></script>
  <script src="./js/search/biomarker-expression-rules.js"></script>
  <script src="./js/search/biomarker-genomic-rules.js"></script>
  <script src="./js/search/search-engine.js"></script>
  <script src="./js/parsing/document-text-parser.js"></script>
  <script src="./js/parsing/table-parser-core.js"></script>
  <script src="./js/parsing/delimited-parser.js"></script>
  <script src="./js/parsing/pdf-browser-parser.js"></script>
  <script src="./js/parsing/pdf-table-parser.js"></script>
  <script src="./js/parsing/xlsx-browser-parser.js"></script>
  <script src="./js/parsing/file-parser.js"></script>
  <script src="./js/parsing/import-pipeline.js"></script>
  <script src="./js/repositories/memory-repository.js"></script>
  <script src="./js/repositories/local-storage-repository.js"></script>
  <script src="./data/synthetic-trials.js"></script>
  <script src="./js/ui/app.js"></script>
  <script src="./js/ui/direct-file-import.js"></script>
</body>
</html>
