<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AJCC 腫瘤分期速查器</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-50 text-slate-900">
<main class="max-w-6xl mx-auto p-6">
  <div class="flex justify-between gap-3 flex-wrap"><a class="text-blue-700" href="./index.html">← 回工具首頁</a><a class="text-blue-700" href="../index.html#clinical-tools">回臨床試驗工作台</a></div>
  <h1 class="text-3xl font-bold mt-6">AJCC 腫瘤分期速查器</h1>
  <p class="text-slate-600 mt-2">7.0 規則由本專案本機載入；T/N/M 下拉選單會依癌種與版本自動縮小，避免選到不存在的組合。不使用遠端試驗資料。</p>
  <p class="text-sm bg-amber-50 border border-amber-200 text-amber-900 rounded p-3 mt-3">Internal quick-check only. 規則包並非完整 AJCC 授權內容；請以院內正式資料與原始手冊交叉確認。</p>
  <div class="grid lg:grid-cols-2 gap-6 mt-6">
    <section class="bg-white rounded-xl border shadow p-5"><h2 class="text-xl font-bold mb-4">查詢</h2><div class="grid grid-cols-2 gap-3"><label class="col-span-2 text-sm font-medium">Cancer site<select id="site" class="mt-1 w-full border rounded p-2"></select></label><label class="text-sm font-medium">Version<select id="ver" class="mt-1 w-full border rounded p-2"><option value="AJCC6">6.0</option><option value="AJCC7" selected>7.0</option><option value="AJCC8">8.0</option></select></label><label class="text-sm font-medium">T<select id="t" class="mt-1 w-full border rounded p-2"></select></label><label class="text-sm font-medium">N<select id="n" class="mt-1 w-full border rounded p-2"></select></label><label class="text-sm font-medium">M<select id="m" class="mt-1 w-full border rounded p-2"></select></label></div><button onclick="lookup()" class="mt-5 bg-emerald-700 text-white rounded-lg px-4 py-2 font-bold">查詢 stage</button><div id="hint" class="mt-3 text-sm text-slate-500"></div></section>
    <section class="bg-white rounded-xl border shadow p-5"><h2 class="text-xl font-bold mb-4">結果</h2><div id="result"></div><button onclick="copyResult()" class="mt-3 bg-slate-200 px-3 py-2 rounded font-bold">複製測試回報</button></section>
  </div>
  <section class="mt-6 bg-white border rounded-xl p-4 text-sm"><b>規則狀態：</b><span id="info">載入中...</span><div class="mt-2 text-slate-600">自動載入本專案 AJCC7 GI 規則；也可手動匯入補充 CSV，補充規則只存在本機。</div><input type="file" accept=".csv,text/csv" class="block w-full border rounded p-2 bg-slate-50 mt-3" onchange="loadFile(event)"><textarea id="csvbox" class="w-full h-24 border rounded p-2 font-mono text-xs mt-2" placeholder="site,edition,t,n,m,stage,note"></textarea><div class="mt-2 flex gap-2"><button onclick="importCSV()" class="bg-blue-700 text-white px-3 py-2 rounded font-bold">匯入補充規則</button><button onclick="clearRules()" class="bg-slate-200 px-3 py-2 rounded font-bold">清除手動匯入</button></div></section>
</main>
<script>
const RULES_URL='./staging_rules_7.csv';
const baseSites=['Esophagus / EGJ - squamous','Esophagus / EGJ - adenocarcinoma','Stomach','Small intestine','Colon','Rectum','Appendix - carcinoma','GIST','HCC / Liver','Intrahepatic bile duct','Perihilar bile duct','Distal bile duct','Gallbladder','Ampulla of Vater','Exocrine pancreas','NET - stomach','NET - duodenum / ampulla','NET - jejunum / ileum','NET - appendix','NET - colon / rectum','NET - pancreas'];
const ORD={t:['Any','Tis','T0','T1','T1a','T1b','T2','T2a','T2b','T3','T3a','T3b','T4','T4a','T4b','TX'],n:['Any','N0','N1','N1a','N1b','N1c','N2','N2a','N2b','N3','N3a','N3b','NX'],m:['M0','M1','M1a','M1b','Any']};
let staticRules=[];
function saved(){try{return JSON.parse(localStorage.getItem('staging_rules_user')||'[]')}catch(e){return[]}}
function allRules(){return saved().concat(staticRules)}
function uniq(a){return [...new Set(a.filter(Boolean))]}
function orderVals(vals,kind){const ord=ORD[kind]||[];return uniq(vals).sort((a,b)=>{let ia=ord.indexOf(a),ib=ord.indexOf(b);ia=ia<0?999:ia;ib=ib<0?999:ib;return ia-ib||String(a).localeCompare(String(b))})}
function setOptions(el,vals,kind){let old=el.value;let arr=orderVals(vals,kind);if(!arr.length)arr=ORD[kind]||[];el.innerHTML=arr.map(x=>`<option value="${x}">${x}</option>`).join('');el.value=arr.includes(old)?old:arr[0]}
function same(ruleVal,userVal){return ruleVal==='Any'||userVal==='Any'||ruleVal===userVal}
function base(v){return String(v||'').replace(/[abc]$/i,'')}
function ok(a,b){return a==='Any'||b==='Any'||a===b||base(b)===a}
function match(r,q){return ok(r.site,q.site)&&ok(r.edition,q.edition)&&ok(r.t,q.t)&&ok(r.n,q.n)&&ok(r.m,q.m)}
function vl(v){return v==='AJCC6'?'6.0':v==='AJCC7'?'7.0':v==='AJCC8'?'8.0':v}
function parseCSV(s){if(!s||!s.trim())return[];return s.replace(/^\uFEFF/,'').trim().split(/\n+/).slice(1).map(line=>{const c=line.split(',').map(x=>x.trim());return{site:c[0],edition:c[1],t:c[2],n:c[3],m:c[4],stage:c[5],note:c.slice(6).join(',')}}).filter(x=>x.site&&x.stage)}
function setInfo(){info.textContent='自動載入 '+staticRules.length+' 筆；手動匯入 '+saved().length+' 筆。'}
function refreshSites(){const vals=uniq(baseSites.concat(allRules().map(r=>r.site)));const old=site.value;site.innerHTML=vals.map(x=>`<option value="${x}">${x}</option>`).join('');site.value=vals.includes(old)?old:(vals.includes('Colon')?'Colon':vals[0])}
function rulesForBase(){return allRules().filter(r=>same(r.site,site.value)&&same(r.edition,ver.value))}
function refreshCascade(changed){const rs=rulesForBase();if(!rs.length){setOptions(t,ORD.t,'t');setOptions(n,ORD.n,'n');setOptions(m,ORD.m,'m');hint.textContent='此癌種/版本尚無規則；可匯入補充規則。';return}if(changed==='site'||changed==='ver'){setOptions(t,rs.map(r=>r.t),'t')}const rt=rs.filter(r=>ok(r.t,t.value));setOptions(n,rt.map(r=>r.n),'n');const rn=rt.filter(r=>ok(r.n,n.value));setOptions(m,rn.map(r=>r.m),'m');hint.textContent='已依目前癌種/版本縮小選單；此癌種版本可用規則 '+rs.length+' 筆。'}
function lookup(){const q={site:site.value,edition:ver.value,t:t.value,n:n.value,m:m.value};window.lastQ=q;const f=allRules().find(r=>match(r,q));window.lastFound=f;result.innerHTML=f?`<div class="p-4 rounded bg-emerald-50 border border-emerald-200"><div class="text-3xl font-bold text-emerald-800">${f.stage}</div><div class="mt-2 text-sm text-emerald-900">${f.site} version ${vl(q.edition)} ${f.t}/${f.n}/${f.m}</div><div class="mt-2 text-sm text-amber-800">${f.note||''}</div></div>`:`<div class="p-4 rounded bg-slate-100 border"><b>未找到規則</b><div class="mt-2 text-sm text-slate-600">請確認癌種、版本與 T/N/M；若選單已自動縮小但仍查不到，可能需匯入補充規則。</div></div>`}
function changed(which){refreshCascade(which);lookup()}
site.onchange=()=>changed('site');ver.onchange=()=>changed('ver');t.onchange=()=>changed('t');n.onchange=()=>changed('n');m.onchange=()=>lookup();
function importCSV(){localStorage.setItem('staging_rules_user',JSON.stringify(parseCSV(csvbox.value)));refreshSites();setInfo();refreshCascade('site');lookup()}
function loadFile(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{csvbox.value=r.result;importCSV()};r.readAsText(f,'utf-8')}
function clearRules(){localStorage.removeItem('staging_rules_user');refreshSites();setInfo();refreshCascade('site');lookup()}
function copyResult(){const q=window.lastQ||{},f=window.lastFound;const txt=`Staging quick-check report\nQuery: ${q.site||''} version ${vl(q.edition)||''} ${q.t||''}/${q.n||''}/${q.m||''}\nResult: ${f?f.stage:'not found'}\nNote: ${f?(f.note||''):''}`;navigator.clipboard&&navigator.clipboard.writeText(txt)}
async function boot(){refreshSites();refreshCascade('site');lookup();try{const r=await fetch(RULES_URL,{cache:'no-store'});if(r.ok)staticRules=parseCSV(await r.text())}catch(e){}refreshSites();setInfo();refreshCascade('site');lookup()}
setInfo();boot();
</script></body></html>
